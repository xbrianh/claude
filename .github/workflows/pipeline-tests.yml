name: pipeline-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline-tests:
    name: pipeline-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run pipeline tests
        working-directory: pipeline
        run: PYTHONPATH=. python -m pytest
